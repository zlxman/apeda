<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>APEDA | SECURE STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fff; color: #111; overflow-x: hidden; direction: ltr; }
        .product-image-container { position: relative; aspect-ratio: 3/4; overflow: hidden; background: #fdfdfd; border-radius: 4px; }
        .product-image { width: 100%; height: 100%; object-fit: cover; transition: transform 0.8s cubic-bezier(0.165, 0.84, 0.44, 1); }
        .product-card:hover .product-image { transform: scale(1.05); }
        
        .size-btn { border: 1px solid #e5e7eb; padding: 10px 16px; font-size: 0.75rem; cursor: pointer; transition: all 0.2s ease; min-width: 50px; text-align: center; border-radius: 2px; font-weight: 600; }
        .size-btn.active { background: #000; color: #fff; border-color: #000; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .size-btn:hover:not(.active) { border-color: #000; }

        .color-dot { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); transition: 0.3s; position: relative; }
        .color-dot.active::after { content: ''; position: absolute; inset: -4px; border: 1.5px solid #000; border-radius: 50%; }
        
        #orderModal { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(8px); padding: 16px; animation: fadeIn 0.3s ease; }
        .modal-container { 
            background: #fff; 
            width: 100%; 
            max-width: 360px; /* تصغير الحجم من 440px إلى 360px */
            border-radius: 16px; 
            overflow: hidden; 
            position: relative; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); 
            animation: slideUp 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            margin: 0 auto;
        }
        
        .close-modal-btn { 
            position: absolute; 
            top: 12px; 
            right: 12px; 
            width: 28px; 
            height: 28px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            background: #f3f4f6; 
            border-radius: 50%; 
            border: none; 
            transition: 0.2s; 
            z-index: 10; 
        }
        .close-modal-btn:hover { background: #e5e7eb; transform: rotate(90deg); }
        
        .input-group { position: relative; margin-bottom: 20px; text-align: right; }
        .input-group input { width: 100%; padding: 10px 0; font-size: 0.85rem; border: none; border-bottom: 2px solid #f3f4f6; outline: none; background: transparent; direction: rtl; }
        .input-group label { position: absolute; top: 10px; right: 0; font-size: 0.8rem; color: #9ca3af; pointer-events: none; transition: 0.3s ease; }
        .input-group input:focus { border-bottom-color: #000; }
        .input-group input:focus + label, .input-group input:not(:placeholder-shown) + label { top: -14px; right: 0; font-size: 0.7rem; color: #000; font-weight: 700; }

        .modal-content { padding: 1.5rem; } /* تقليل الحشوة الداخلية */

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        @media (max-width: 640px) {
            .modal-container { 
                margin-bottom: 0; 
                border-radius: 20px 20px 0 0; 
                position: fixed; 
                bottom: 0; 
                max-width: 100%; 
                animation: slideUpFull 0.4s ease-out;
            }
        }
        @keyframes slideUpFull { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .shipping-badge { background: #fafafa; border: 1px solid #f0f0f0; border-radius: 40px; padding: 0.4rem 0.8rem; font-size: 0.7rem; font-weight: 600; display: inline-flex; align-items: center; gap: 0.4rem; }
        .shipping-highlight { color: #000; font-weight: 800; margin-right: 0.25rem; }

        .icon-logo { width: 24px; height: 24px; object-fit: contain; border-radius: 0; }

        /* تصغير حجم النصوص في الموبايل */
        @media (max-width: 480px) {
            .modal-content { padding: 1.2rem; }
            .input-group input { font-size: 0.8rem; }
            .input-group label { font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <header class="border-b border-gray-100 sticky top-0 bg-white/80 backdrop-blur-md z-50 px-6">
        <div class="container mx-auto grid grid-cols-3 items-center h-16 md:h-20">
            <!-- Left: Brand Text -->
            <div class="text-[12px] font-black tracking-[0.3em] uppercase">A P E D A</div>
            
            <!-- Center: Logo Image -->
            <div class="flex justify-center">
                <img src="images/00.png" alt="Logo" class="h-8 md:h-12 object-contain" onerror="this.style.display='none'">
            </div>
                        
        </div>
    </header>

    <main class="container mx-auto px-6 py-12">
        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-x-8 gap-y-16"></div>
    </main>

    <div id="orderModal" onclick="closeModal()">
        <div class="modal-container" onclick="event.stopPropagation()">
            <button class="close-modal-btn" onclick="closeModal()"><i class="fas fa-times"></i></button>
            <div class="modal-content">
                <div class="mb-4 text-center">
                    <h2 class="text-[9px] font-black tracking-[0.4em] uppercase mb-1 text-gray-400">Confirmation</h2>
                    <div class="h-0.5 w-6 bg-black mx-auto mt-1"></div>
                </div>
                
                <div id="summaryContent" class="bg-gray-50 rounded-lg p-4 mb-3 text-[10px] border border-gray-100 text-right"></div>
                
                <!-- ملاحظة التوصيل خارج مريرت -->
                <div class="flex justify-end mb-4">
                    <div class="shipping-badge">
                        <i class="fa-solid fa-truck text-[9px] text-gray-400"></i>
                        <span class="shipping-highlight">+40 DH</span>
                        <span class="text-gray-500">خارج مريرت </span>
                        <i class="fa-solid fa-circle-info text-[7px] text-gray-300 ml-1" title="تطبق رسوم توصيل إضافية خارج مدينة مريرت"></i>
                    </div>
                </div>
                
                <form id="orderForm">
                    <div class="space-y-1 mb-6">
                         <p class="text-[9px] font-bold uppercase tracking-widest text-right mb-3 border-r-2 border-black pr-2">بيانات التوصيل</p>
                        <div class="input-group">
                            <input type="text" id="custName" placeholder=" " required>
                            <label>الاسم الكامل</label>
                        </div>
                        <div class="input-group">
                            <input type="tel" id="custPhone" placeholder=" " required>
                            <label>رقم الواتساب</label>
                        </div>
                        <div class="input-group">
                            <input type="text" id="custCity" placeholder=" " required>
                            <label>المدينة</label>
                        </div>
                        <div class="input-group">
                            <input type="text" id="custAddress" placeholder=" " required>
                            <label>العنوان بالتفصيل</label>
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-black text-white py-3 rounded-full font-bold text-[10px] tracking-widest uppercase hover:bg-zinc-800 transition-all transform active:scale-[0.98] shadow-lg shadow-gray-200">
                        إتمام الطلب عبر واتساب <i class="fab fa-whatsapp ml-2"></i>
                    </button>
                    <div class="mt-4 flex items-center justify-center gap-3 text-gray-300">
                        <span class="h-px bg-gray-100 flex-1"></span>
                        <i class="fa-solid fa-shield-halved text-[10px]"></i>
                        <span class="h-px bg-gray-100 flex-1"></span>
                    </div>
                    <p class="text-center text-[8px] text-gray-400 mt-3 uppercase tracking-tighter">الدفع عند الاستلام • التوصيل سريع • خدمة 24/7</p>
                </form>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            WHATSAPP_NUMBER: "212777128266"
        };

        const PRODUCTS = [
            { id: 1, name: "SABR HOODIE", price: 180, stock: "1/1", colors: [{ name: "Black", hex: "#000", img: "images/AA.png" }], sizes: ["S", "M", "L", "XL"] },
            { id: 2, name: "WATCH", price: 90, stock: "1/1", colors: [{ name: "Black", hex: "#000", img: "images/11.png" }], sizes: ["S"] },
            { id: 5, name: "UNAVAILABLE", price: 000, stock: "0/0", colors: [{ name: "Black", hex: "#000", img: "images/XX.png" }, { name: "White", hex: "#fff", img: "images/11.png" }], sizes: ["S", "M", "L", "XL"] },
            { id: 3, name: "UNAVAILABLE", price: 130, stock: "1/1", colors: [{ name: "Black", hex: "#000", img: "images/XX.jpg" }], sizes: ["S"] },
            { id: 4, name: "UNAVAILABLE", price: 000, stock: "0/0", colors: [{ name: "Black", hex: "#000", img: "images/xx.png" }], sizes: ["S"] },
        ];

        let currentOrder = null;

        function renderProducts() {
            const grid = document.getElementById('productGrid');
            if(!grid) return;
            grid.innerHTML = PRODUCTS.map(p => `
                <div class="product-card group" data-pid="${p.id}">
                    <div class="product-image-container mb-6">
                        <img src="${p.colors[0].img}" class="product-image" id="img-${p.id}" onerror="this.src='https://placehold.co/500x667?text=${p.name}'">
                        <span class="absolute top-4 left-4 bg-black text-white text-[8px] px-2 py-1 font-bold uppercase tracking-widest">${p.stock}</span>
                    </div>
                    <div class="text-center">
                        <h3 class="text-[11px] font-bold tracking-widest mb-1 uppercase">${p.name}</h3>
                        <p class="text-[11px] text-gray-400 mb-5 font-medium">${p.price} DH</p>
                        <div class="flex justify-center gap-4 mb-5">
                            ${p.colors.map((c, i) => `<div class="color-dot ${i===0?'active':''}" style="background-color: ${c.hex}" onclick="updateColor(${p.id}, '${c.img}', this)"></div>`).join('')}
                        </div>
                        <div class="flex justify-center gap-2 mb-6">
                            ${p.sizes.map((s, i) => `<div class="size-btn ${i===0?'active':''}" onclick="updateSize(this)">${s}</div>`).join('')}
                        </div>
                        <button onclick="openOrderModal(${p.id})" class="w-full border-2 border-black py-3 text-[10px] font-black tracking-widest uppercase hover:bg-black hover:text-white transition-all duration-300">اطلب الآن</button>
                    </div>
                </div>
            `).join('');
        }

        window.updateColor = (pid, imgPath, el) => {
            const img = document.getElementById(`img-${pid}`);
            img.style.opacity = '0.5';
            setTimeout(() => {
                img.src = imgPath;
                img.style.opacity = '1';
            }, 150);
            el.parentElement.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
        };

        window.updateSize = (el) => {
            el.parentElement.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        };

        window.openOrderModal = (pid) => {
            const card = document.querySelector(`[data-pid="${pid}"]`);
            const p = PRODUCTS.find(item => item.id === pid);
            const size = card.querySelector('.size-btn.active').innerText;
            currentOrder = { product: p.name, price: p.price, size: size };
            
            // عرض الملخص (بدون رسوم التوصيل الآن، ستضاف بعد اختيار المدينة)
            updateSummary(''); // تمرير مدينة فارغة في البداية
            
            document.getElementById('orderModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        };

        // دالة تحديث الملخص مع مراعاة رسوم التوصيل خارج مريرت
        function updateSummary(city) {
            const isMrirt = city.trim().toLowerCase() === 'مريرت' || city.trim().toLowerCase() === 'mrirt' || city.trim() === '';
            const shippingFee = (city.trim() !== '' && !isMrirt) ? 40 : 0;
            
            let summaryHtml = `
                <div class="flex justify-between items-center mb-1 font-medium"><span>${currentOrder.product}</span><span class="text-gray-400">المنتج</span></div>
                <div class="flex justify-between items-center mb-1 font-medium"><span>${currentOrder.size}</span><span class="text-gray-400">المقاس</span></div>
            `;
            
            if (shippingFee > 0) {
                summaryHtml += `<div class="flex justify-between items-center mb-1 font-medium"><span>${shippingFee} DH</span><span class="text-gray-400">رسوم التوصيل</span></div>`;
            }
            
            const total = currentOrder.price + shippingFee;
            summaryHtml += `<div class="flex justify-between items-center pt-2 mt-2 border-t border-gray-100 font-bold text-black text-[12px]"><span>${total} DH</span><span>المجموع الكلي</span></div>`;
            
            document.getElementById('summaryContent').innerHTML = summaryHtml;
        }

        window.closeModal = () => { 
            document.getElementById('orderModal').style.display = 'none'; 
            document.body.style.overflow = '';
        };

        // مراقبة حقل المدينة لتحديث الملخص تلقائياً
        document.getElementById('custCity')?.addEventListener('input', function(e) {
            if (currentOrder) {
                updateSummary(e.target.value);
            }
        });

        document.getElementById('orderForm').onsubmit = (e) => {
            e.preventDefault();
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const city = document.getElementById('custCity').value;
            const address = document.getElementById('custAddress').value;

            const isMrirt = city.trim().toLowerCase() === 'مريرت' || city.trim().toLowerCase() === 'mrirt';
            const shippingFee = (!isMrirt && city.trim() !== '') ? 40 : 0;
            const totalPrice = currentOrder.price + shippingFee;

            let waMsg = `طلب جديد من APEDA:\n\n`;
            waMsg += `🛍️ المنتج: ${currentOrder.product}\n`;
            waMsg += `📏 المقاس: ${currentOrder.size}\n`;
            waMsg += `💰 سعر المنتج: ${currentOrder.price} DH\n`;
            if (shippingFee > 0) {
                waMsg += `🚚 توصيل (خارج مريرت): +40 DH\n`;
            }
            waMsg += `💵 المجموع: ${totalPrice} DH\n\n`;
            waMsg += `👤 الاسم: ${name}\n`;
            waMsg += `📍 المدينة: ${city}\n`;
            if (shippingFee === 0 && city.trim() !== '') {
                waMsg += `✨ (داخل مريرت - توصيل مجاني)\n`;
            }
            waMsg += `🏠 العنوان: ${address}\n`;
            waMsg += `📞 الهاتف: ${phone}\n\n`;
            waMsg += `يرجى تأكيد طلبي.`;
            
            window.open(`https://wa.me/${CONFIG.WHATSAPP_NUMBER}?text=${encodeURIComponent(waMsg)}`, '_blank');
            closeModal();
        };

        window.onload = renderProducts;
    </script>
</body>
</html>
